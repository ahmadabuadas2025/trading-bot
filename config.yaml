app:
  name: SolanaJupiterBot
  timezone: UTC
  log_level: INFO
  db_path: data/bot.db
  log_path: logs/bot.log
  mode: paper  # paper or live

risk:
  max_risk_per_trade_pct: 0.02
  max_daily_drawdown_pct: 0.05
  max_open_trades_per_strategy: 5  # allow more concurrent trades
  auto_shutdown_on_breach: true

paper_trading:
  starting_balance_usd: 1000.0
  fallback_sol_usd: 150.0

jupiter:
  base_url: "https://quote-api.jup.ag/v6"
  price_api_url: "https://api.jup.ag/price/v2"
  default_slippage_bps: 100
  max_slippage_bps: 150
  request_timeout_seconds: 15
  max_retries: 3

copy_trading:
  enabled: true
  min_liquidity_usd: 50000
  max_market_cap_usd: 50000000
  min_wallet_win_rate: 0.55
  position_size_pct_of_signal: 0.15
  stop_loss_pct: -0.12
  take_profit_pct: 0.35
  # Add wallet addresses of profitable traders you want to copy.
  # Copy trading will not produce trades until this list is populated.
  # Example:
  #   - "YourTargetWalletAddress1..."
  #   - "YourTargetWalletAddress2..."
  tracked_wallets:
    # IMPORTANT: Add wallet addresses of profitable Solana traders here.
    # Copy trading will NOT work until this list is populated.
    # Find active profitable wallets on birdeye.so or solscan.io
    # Example format:
    # - "WalletPublicKeyHere..."
    []

hot_trading:
  enabled: true
  volume_spike_multiplier: 2.0    # lowered for more signals
  volume_spike_window_seconds: 180  # shorter window for faster detection
  take_profit_pct: 0.02
  stop_loss_pct: -0.0075
  max_hold_seconds: 120

gem_detector:
  enabled: true
  min_liquidity_usd: 10000    # lowered — 30000 too strict for new tokens
  min_holders: 30              # lowered — 100 too strict for new tokens
  allocation_pct: 0.02
  take_profit_multiplier: 3.0
  stop_loss_pct: -0.30

arbitrage:
  enabled: true
  min_profit_threshold_pct: 0.003
  max_capital_pct: 0.07
  max_concurrent_trades: 2
  max_consecutive_failures: 5
  scan_interval_seconds: 2

safety:
  max_risk_score: 50
  reject_mint_authority: true
  reject_freeze_authority: true
  max_top_holder_pct: 0.25
  min_token_age_seconds: 30
  restricted_age_seconds: 300
  honeypot_check_enabled: true

solana:
  #"https://mainnet.helius-rpc.com/?api-key=a1425afc-46ad-4fa1-a154-b40e3a413844"  # CHANGE THIS to your Helius/Tatum RPC for reliable live mode
  rpc_url: "https://mainnet.helius-rpc.com/?api-key=610f5fb0-ddaa-49ae-8425-0840f4e62594"
dashboard:
  refresh_interval_seconds: 5

http:
  max_retries: 3
  backoff_base_seconds: 1.0
  default_timeout_seconds: 20
